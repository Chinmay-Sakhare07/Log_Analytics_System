ingestion:
  url: "https://log-analytics-ingestion.fly.dev"
  api_key: "log-analytics-secret-2026"
  timeout_secs: 30

registry:
  path: "shipper_registry.json"

buffer:
  path: "shipper_buffer.jsonl"

batching:
  batch_size: 100
  flush_interval_secs: 5

watch:
  log_dir: "./logs"
  file_pattern: "*.log"
  poll_interval_secs: 2

retry:
  max_retries: 6
  initial_backoff_secs: 1
  backoff_multiplier: 2
  max_backoff_secs: 60